<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <link rel="stylesheet" href="assets/css/style.css?v=2">
</head>
<body>
    <div class="container">
        <span class="emoji">👋</span>
        <h1>Hello, World!</h1>
        <p>Welcome to my GitHub Pages site, served through the Cloudflare CDN.</p>

        <div class="gallery">
            <img src="assets/img/cloud.svg" alt="Cloud" width="140" height="140" loading="lazy">
            <img src="assets/img/rocket.svg" alt="Rocket" width="140" height="140" loading="lazy">
            <img src="assets/img/globe.svg" alt="Globe" width="140" height="140" loading="lazy">
        </div>

        <div class="cdn-panel">
            <button id="cdn-test-btn" type="button">Test CDN cache status</button>
            <pre id="cdn-result">Click the button to inspect the CDN response headers.</pre>
        </div>
    </div>

    <script src="assets/js/main.js?v=2" defer></script>
</body>
</html>
