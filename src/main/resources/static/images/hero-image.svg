<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  
  <!-- Dashboard illustration -->
  <rect x="50" y="50" width="500" height="300" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Header bar -->
  <rect x="50" y="50" width="500" height="40" rx="10" rx="10" fill="url(#grad1)"/>
  <circle cx="70" cy="70" r="6" fill="white" opacity="0.8"/>
  <circle cx="90" cy="70" r="6" fill="white" opacity="0.8"/>
  <circle cx="110" cy="70" r="6" fill="white" opacity="0.8"/>
  
  <!-- Content blocks -->
  <rect x="70" y="110" width="200" height="80" rx="5" fill="#e2e8f0"/>
  <rect x="290" y="110" width="240" height="80" rx="5" fill="#e2e8f0"/>
  
  <!-- Charts -->
  <circle cx="140" cy="250" r="50" fill="none" stroke="url(#grad1)" stroke-width="10"/>
  <circle cx="140" cy="250" r="50" fill="none" stroke="#e2e8f0" stroke-width="10" stroke-dasharray="157 314"/>
  
  <!-- Bar chart -->
  <rect x="250" y="240" width="30" height="60" rx="3" fill="url(#grad1)"/>
  <rect x="290" y="220" width="30" height="80" rx="3" fill="url(#grad1)" opacity="0.7"/>
  <rect x="330" y="250" width="30" height="50" rx="3" fill="url(#grad1)" opacity="0.5"/>
  <rect x="370" y="210" width="30" height="90" rx="3" fill="url(#grad1)" opacity="0.8"/>
  
  <!-- Decorative elements -->
  <circle cx="480" cy="250" r="8" fill="#667eea" opacity="0.6"/>
  <circle cx="500" cy="270" r="6" fill="#764ba2" opacity="0.6"/>
  <circle cx="520" cy="245" r="7" fill="#667eea" opacity="0.6"/>
</svg>
